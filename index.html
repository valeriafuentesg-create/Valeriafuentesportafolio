<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #2a2a2a;
            padding: 20px;
        }

        .container {
            background-color: #d4bfbe;
            min-height: 100vh;
            padding: 0;
        }

        /* Header con dos secciones */
        .header {
            display: flex;
            background-color: #d4bfbe;
        }

        .section-15 {
            flex: 1;
            background-color: #c98b8b;
            padding: 20px;
            position: relative;
        }

        .section-15-label {
            position: absolute;
            top: 5px;
            left: 5px;
            background-color: #555;
            color: white;
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 3px;
        }

        .frame-8 {
            flex: 1;
            background-color: #d9a5a5;
            padding: 20px;
            position: relative;
        }

        .frame-8-label {
            position: absolute;
            top: 5px;
            right: 5px;
            color: #888;
            font-size: 12px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            height: 60px;
        }

        .header-spacer {
            background-color: #d4bfbe;
            width: 50px;
        }

        .header-button {
            background-color: #b87777;
            border: 1px solid #a05555;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 12px;
            color: #333;
        }

        /* Contenido principal */
        .main-content {
            display: flex;
            padding: 40px 20px;
            gap: 40px;
        }

        /* Sidebar izquierdo */
        .left-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80px;
        }

        .frame-label {
            color: #999;
            font-size: 11px;
            margin-bottom: 5px;
        }

        .sidebar-button {
            background-color: #c98b8b;
            border: 1px solid #b87777;
            padding: 40px 20px;
            cursor: pointer;
            font-size: 12px;
            color: #333;
            text-align: center;
        }

        /* Área central con imagen */
        .center-area {
            flex: 1;
            max-width: 400px;
        }

        .image-container {
            background-color: #4a4a4a;
            height: 550px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
        }

        /* Área derecha */
        .right-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .frame-9 {
            position: relative;
        }

        .frame-9-label {
            color: #999;
            font-size: 11px;
            margin-bottom: 10px;
        }

        .text-box-small {
            background-color: #a88b8b;
            padding: 15px;
            color: white;
            font-size: 12px;
        }

        .frame-10 {
            position: relative;
        }

        .frame-10-label {
            color: #999;
            font-size: 11px;
            margin-bottom: 10px;
        }

        .text-box-large {
            background-color: #b89c9c;
            padding: 40px 20px;
            color: white;
            font-size: 12px;
            min-height: 200px;
        }

        /* Sección inferior */
        .bottom-section {
            display: flex;
            gap: 30px;
            margin-top: 50px;
        }

        .section-13 {
            background-color: #4a4a4a;
            padding: 30px;
            flex: 1;
            max-width: 250px;
            position: relative;
        }

        .section-13-label {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 12px;
        }

        .link-text {
            color: #ccc;
            font-size: 12px;
            text-align: center;
            margin-top: 20px;
        }

        .frame-12 {
            background-color: #4a4a4a;
            padding: 30px;
            flex: 1;
            max-width: 250px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .frame-12-label {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #999;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-spacer"></div>
            <div class="section-15">
                <div class="section-15-label">Section 15</div>
                <div class="button-group">
                    <button class="header-button">Button</button>
                    <button class="header-button">Button</button>
                    <button class="header-button">Button</button>
                    <button class="header-button">Button</button>
                    <button class="header-button">Button</button>
                </div>
            </div>
            <div class="frame-8">
                <div class="frame-8-label">Frame 8</div>
                <div class="button-group">
                    <button class="header-button">Button</button>
                    <button class="header-button">Button</button>
                    <button class="header-button">Button</button>
                    <button class="header-button">Button</button>
                    <button class="header-button">Button</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left Sidebar -->
            <div class="left-sidebar">
                <div>
                    <div class="frame-label">Frame 14</div>
                    <button class="sidebar-button">Button</button>
                </div>
                <div>
                    <div class="frame-label">Frame 2</div>
                    <button class="sidebar-button">Button</button>
                </div>
                <div>
                    <div class="frame-label">Frame 3</div>
                    <button class="sidebar-button">Button</button>
                </div>
            </div>

            <!-- Center Area -->
            <div class="center-area">
                <div class="frame-label">Frame 16</div>
                <div class="image-container">
                    imagen
                </div>
            </div>

            <!-- Right Area -->
            <div class="right-area">
                <div class="frame-9">
                    <div class="frame-9-label">Frame 9</div>
                    <div class="text-box-small">texto</div>
                </div>

                <div class="frame-10">
                    <div class="frame-10-label">Frame 10</div>
                    <div class="text-box-large">texto</div>
                </div>

                <div class="bottom-section">
                    <div class="section-13">
                        <div class="section-13-label">Section 13</div>
                        <div class="link-text">link</div>
                    </div>

                    <div class="frame-12">
                        <div class="frame-12-label">Frame 12</div>
                        <div class="link-text">link</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
